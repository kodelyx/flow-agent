name: Build Executables

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      working-directory: ./flow-agent
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .

    - name: Build Executables with PyInstaller
      working-directory: ./flow-agent
      run: |
        pyinstaller --name flow --onefile flow_cli/main.py
        pyinstaller --name flow-mcp --onefile flow_mcp_server.py

    - name: Rename Binaries for Release
      working-directory: ./flow-agent/dist
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          mv flow.exe flow-cli-windows.exe
          mv flow-mcp.exe flow-mcp-windows.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          mv flow flow-cli-macos
          mv flow-mcp flow-mcp-macos
        else
          mv flow flow-cli-linux
          mv flow-mcp flow-mcp-linux
        fi

    - name: Upload Artifacts (flow)
      uses: actions/upload-artifact@v4
      with:
        name: flow-${{ matrix.os }}
        path: flow-agent/dist/flow*

    - name: Upload Artifacts (flow-mcp)
      uses: actions/upload-artifact@v4
      with:
        name: flow-mcp-${{ matrix.os }}
        path: flow-agent/dist/flow-mcp*

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          flow-agent/dist/flow*
          flow-agent/dist/flow-mcp*
